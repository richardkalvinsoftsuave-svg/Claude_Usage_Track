<div id="preview" class="bg-white rounded-lg shadow p-6 mt-6">
  <div class="flex items-center justify-between mb-4">
    <h2 class="text-lg font-semibold">Review extracted values</h2>
    <span class="badge badge-{{ method }}">{{ method | upper }}</span>
  </div>

  <div class="flex flex-col md:flex-row gap-6">
    <div class="shrink-0">
      <img src="/uploads/{{ image_path }}" class="upload-thumb rounded border" alt="Uploaded screenshot">
    </div>

    <form id="confirm-form" class="flex-1 space-y-4" hx-post="/partials/confirm" hx-target="#recent-uploads" hx-swap="outerHTML">
      <input type="hidden" name="image_path" value="{{ image_path }}">
      <input type="hidden" name="original_filename" value="{{ original_filename }}">
      <input type="hidden" name="raw_extracted_text" value="{{ raw_text }}">
      <input type="hidden" name="extraction_method" value="{{ method }}">
      <input type="hidden" name="was_manually_edited" value="false">

      <div>
        <label class="block text-sm font-medium text-gray-700">Uploader name</label>
        <input name="uploader_name" list="uploader-names" required
               class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm px-3 py-2 border"
               placeholder="Your name">
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700">Auth method</label>
          <input name="auth_method" type="text"
                 value="{{ extracted.auth_method or '' }}"
                 class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm px-3 py-2 border">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Email</label>
          <input name="email" type="email"
                 value="{{ extracted.email or '' }}"
                 class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm px-3 py-2 border">
        </div>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700">Organization</label>
          <input name="organization" type="text"
                 value="{{ extracted.organization or '' }}"
                 class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm px-3 py-2 border">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Plan</label>
          <input name="plan_tier" type="text"
                 value="{{ extracted.plan_tier or '' }}"
                 class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm px-3 py-2 border"
                 placeholder="Claude team / Pro / Max 5x">
        </div>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700">Session usage %</label>
          <input name="session_usage_pct" type="number" min="0" max="100"
                 value="{{ extracted.session_usage_pct if extracted.session_usage_pct is not none else '' }}"
                 class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm px-3 py-2 border">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Weekly usage %</label>
          <input name="weekly_usage_pct" type="number" min="0" max="100"
                 value="{{ extracted.weekly_usage_pct if extracted.weekly_usage_pct is not none else '' }}"
                 class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm px-3 py-2 border">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Weekly Fable %</label>
          <input name="weekly_fable_usage_pct" type="number" min="0" max="100"
                 value="{{ extracted.weekly_fable_usage_pct if extracted.weekly_fable_usage_pct is not none else '' }}"
                 class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm px-3 py-2 border">
        </div>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700">Session reset (UTC)</label>
          <input name="session_reset_at" type="datetime-local"
                 value="{{ extracted.session_reset_at.strftime('%Y-%m-%dT%H:%M') if extracted.session_reset_at else '' }}"
                 class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm px-3 py-2 border">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Weekly reset (UTC)</label>
          <input name="weekly_reset_at" type="datetime-local"
                 value="{{ extracted.weekly_reset_at.strftime('%Y-%m-%dT%H:%M') if extracted.weekly_reset_at else '' }}"
                 class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm px-3 py-2 border">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Fable reset (UTC)</label>
          <input name="weekly_fable_reset_at" type="datetime-local"
                 value="{{ extracted.weekly_fable_reset_at.strftime('%Y-%m-%dT%H:%M') if extracted.weekly_fable_reset_at else '' }}"
                 class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm px-3 py-2 border">
        </div>
      </div>

      <div class="flex flex-wrap items-center gap-3 pt-2">
        <button type="button"
                hx-post="/partials/reextract?image_path={{ image_path }}"
                hx-target="#preview"
                hx-swap="innerHTML"
                hx-indicator="#reextract-spinner"
                class="inline-flex items-center rounded-md bg-purple-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-purple-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-purple-600">
          <span id="reextract-spinner" class="htmx-indicator mr-2 hidden">⏳</span>
          Re-extract with AI
        </button>
        <button type="submit"
                class="inline-flex rounded-md bg-blue-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-blue-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-blue-600">
          Confirm & Save
        </button>
      </div>
      <p class="text-xs text-gray-500">The AI re-extraction runs locally via Ollama and can take 10–40 seconds on CPU.</p>
    </form>
  </div>
</div>
