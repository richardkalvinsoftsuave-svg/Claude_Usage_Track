<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Claude Usage Tracker{% endblock %}</title>
  <script src="{{ url_for('static', path='/vendor/tailwindcss.js') }}"></script>
  <script src="{{ url_for('static', path='/vendor/htmx.js') }}" defer></script>
  <script src="{{ url_for('static', path='/vendor/alpinejs.js') }}" defer></script>
  <script src="{{ url_for('static', path='/vendor/chart.js') }}"></script>
  <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
  {% block head %}{% endblock %}
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">
  <nav class="bg-slate-900 text-white shadow">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="font-bold text-lg tracking-tight">Claude Usage Tracker</div>
      <div class="flex gap-6 text-sm">
        <a href="/" class="hover:text-blue-300 {% if active == 'upload' %}underline underline-offset-4{% endif %}">Upload</a>
        <a href="/dashboard" class="hover:text-blue-300 {% if active == 'dashboard' %}underline underline-offset-4{% endif %}">Dashboard</a>
      </div>
    </div>
  </nav>
  <main class="max-w-6xl mx-auto px-6 py-8">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
